# Incident Management System: CI/CD Pipeline
# Trigger: push to main, pull_request targeting main
# Stack: Java 17, Maven, PostgreSQL 17, Railway deploy
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch (PR or push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Environment-level variables for run steps
env:
  POSTGRES_DB: icglma_local
  POSTGRES_USER: icglma
  POSTGRES_PASSWORD: ICGLMA@2025

# Workflow Jobs
jobs:

  # JOB 1: Build, Static Analysis & Integration Tests
  build-and-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    # PostgreSQL 17 Docker sidecar
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: icglma_local
          POSTGRES_USER: icglma
          POSTGRES_PASSWORD: ICGLMA@2025
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (Temurin) with Maven dependency caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Cache Maven repository
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Verify DB connectivity to sidecar
      - name: Verify PostgreSQL connection
        run: |
          pg_isready -h localhost -p 5432
          echo "PostgreSQL 17 sidecar is ready."

      # Fix permissions for Linux runner
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # 5. Full build with static code analysis and integration tests
      - name: Build, analyze & verify with Maven
        run: ./mvnw clean verify -B -V
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      # 6. Upload test report
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      # 7. Upload static-analysis reports (PMD only)
      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: target/pmd.xml
          retention-days: 7

  # JOB 2: Automated Railway Deployment (main branch only)
  deploy:
    name: Deploy to Railway
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service incident-management-system
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
