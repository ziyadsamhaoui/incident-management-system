spring.application.name=incident-management-system

### PostgreSQL

spring.datasource.url=jdbc:postgresql://localhost:5432/icglma_local
spring.datasource.username=icglma
spring.datasource.password=ICGLMA@2025

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=true

### Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

### JWT configuration used for signing tokens
